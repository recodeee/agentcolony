<svg xmlns="http://www.w3.org/2000/svg" width="900" height="506" viewBox="0 0 900 506" role="img" aria-labelledby="title desc">
  <title id="title">Colony live graph</title>
  <desc id="desc">A dark viewer mockup based on the live Colony graph: central agent clusters, typed edges for messages, handoffs, shares, claims, and a glance panel.</desc>
  <defs>
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#bbf7d0" stop-opacity="0.72"/>
      <stop offset="0.35" stop-color="#34d399" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pinkGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fb7185" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <style>
      text{fill:#e5e7eb;font-family:Arial,sans-serif;letter-spacing:0}
      .label{font-family:Arial,sans-serif;fill:#e5e7eb;letter-spacing:0}
      .muted{fill:#94a3b8}
      .mono{font-family:monospace;letter-spacing:0}
      .panel{fill:#090b0e;stroke:#242a35;stroke-width:1.1}
      .side{fill:#0d0d10;stroke:#242a35;stroke-width:1}
      .grid{stroke:#17202b;stroke-width:0.8}
      .share{stroke:#34d399;stroke-width:1.7;fill:none;opacity:0.6}
      .claim{stroke:#fb7185;stroke-width:1.3;fill:none;opacity:0.55;stroke-dasharray:2 4}
      .handoff{stroke:#fbbf24;stroke-width:1.5;fill:none;opacity:0.5;stroke-dasharray:5 6}
      .message{stroke:#67e8f9;stroke-width:1.5;fill:none;opacity:0.58}
      .participant{stroke:#94a3b8;stroke-width:1;fill:none;opacity:0.35}
      .node{fill:#9ae6b4;stroke:#264f3d;stroke-width:1}
      .node2{fill:#c4b5fd;stroke:#4c1d95;stroke-width:1}
      .node3{fill:#fda4af;stroke:#7f1d1d;stroke-width:1}
      .tiny{font-size:10px}
      .small{font-size:12px}
    </style>
  </defs>
  <rect width="900" height="506" rx="20" fill="#050607"/>
  <rect x="1" y="1" width="898" height="504" rx="19" fill="none" stroke="#1f2937"/>
  <g transform="translate(18 18)">
    <text fill="#e5e7eb" class="label" x="0" y="20" font-size="20" font-weight="720">Colony Graph</text>
    <text fill="#94a3b8" class="label muted" x="0" y="43" font-size="12">Force-directed view of sessions and typed relationships. Pin nodes, pan background, inspect active lanes.</text>
  </g>
  <g transform="translate(12 68)">
