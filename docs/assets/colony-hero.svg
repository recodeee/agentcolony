    <path d="M58 0V300M116 0V300M174 0V300M232 0V300M290 0V300M348 0V300M406 0V300M464 0V300M522 0V300M580 0V300M638 0V300M696 0V300M754 0V300M812 0V300" stroke="#334155"/>
  </g>
  <g transform="translate(68 55)">
