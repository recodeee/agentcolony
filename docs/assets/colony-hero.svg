<svg xmlns="http://www.w3.org/2000/svg" width="860" height="300" viewBox="0 0 860 300" role="img" aria-labelledby="title desc">
  <title id="title">Colony local-first coordination for coding agents</title>
  <desc id="desc">A dark README hero showing several coding agents coordinating through Colony, Queen plans, MCP tools, and local storage.</desc>
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07110f"/>
      <stop offset="0.45" stop-color="#0a0f1f"/>
      <stop offset="1" stop-color="#100a18"/>
    </linearGradient>
    <radialGradient id="hero-glow" cx="50%" cy="48%" r="55%">
      <stop offset="0" stop-color="#6ee7b7" stop-opacity="0.52"/>
      <stop offset="0.42" stop-color="#22d3ee" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#0b1020" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <style>
      text{fill:#e5e7eb;font-family:Arial,sans-serif;letter-spacing:0}
      .panel{fill:#0b0f14;stroke:#1f2937;stroke-width:1}
      .thin{stroke:#334155;stroke-width:1;fill:none}
      .trail{stroke:#34d399;stroke-width:2;fill:none;stroke-linecap:round}
      .trail2{stroke:#60a5fa;stroke-width:2;fill:none;stroke-linecap:round}
      .trail3{stroke:#fbbf24;stroke-width:2;fill:none;stroke-linecap:round;stroke-dasharray:5 7}
      .node{fill:#bbf7d0;stroke:#34d399;stroke-width:2}
      .agent{fill:#111827;stroke:#475569;stroke-width:1.2}
      .label{font-family:Arial,sans-serif;fill:#e5e7eb}
      .muted{fill:#94a3b8}
      .tiny{font-size:12px;letter-spacing:0}
      .small{font-size:14px;letter-spacing:0}
      .mono{font-family:monospace;letter-spacing:0}
    </style>
  </defs>
  <rect width="860" height="300" rx="24" fill="url(#hero-bg)"/>
  <rect x="1" y="1" width="858" height="298" rx="23" fill="none" stroke="#1f2937"/>
  <circle cx="430" cy="148" r="158" fill="url(#hero-glow)"/>
  <g opacity="0.18">
