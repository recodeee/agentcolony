      <circle class="agent" cx="161" cy="41" r="25"/>
      <text font-size="12" fill="#e5e7eb" class="label mono tiny" x="141" y="46">Codex</text>
      <circle class="agent" cx="51" cy="126" r="25"/>
      <text font-size="12" fill="#e5e7eb" class="label mono tiny" x="30" y="131">Claude</text>
      <circle class="agent" cx="283" cy="126" r="25"/>
      <text font-size="12" fill="#e5e7eb" class="label mono tiny" x="264" y="131">Cursor</text>
      <circle class="agent" cx="123" cy="221" r="25"/>
      <text font-size="12" fill="#e5e7eb" class="label mono tiny" x="99" y="226">Gemini</text>
      <circle class="agent" cx="205" cy="224" r="25"/>
      <text font-size="12" fill="#e5e7eb" class="label mono tiny" x="179" y="229">OpenCode</text>
    </g>
    <g filter="url(#soft)" opacity="0.9">
