    <circle cx="161" cy="124" r="62" fill="#34d399" opacity="0.08"/>
    <circle cx="161" cy="124" r="76" fill="#34d399" opacity="0.04"/>
    <text fill="#e5e7eb" class="label" x="117" y="116" font-size="18" font-weight="700">Colony</text>
    <text font-size="12" fill="#94a3b8" class="label mono tiny muted" x="115" y="139">local traces</text>
